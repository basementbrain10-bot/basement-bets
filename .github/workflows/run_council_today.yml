name: Run Council (Today)

on:
  workflow_dispatch:
    inputs:
      date_et:
        description: "Optional ET date (YYYY-MM-DD). Leave blank for server default."
        required: false
        default: ""
  schedule:
    # 15:05 UTC ~ 10:05 ET (Health Check). 
    # The primary runs now occur hourly via ncaam_jobs.yml
    - cron: "5 15 * * *"

jobs:
  run_council_today:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Vercel job (/api/jobs/run_council_today)
        env:
          BASEMENT_BETS_URL: ${{ secrets.BASEMENT_BETS_URL }}
          BASEMENT_CRON_SECRET: ${{ secrets.BASEMENT_CRON_SECRET }}
          DATE_ET: ${{ github.event.inputs.date_et }}
        run: |
          set -euo pipefail

          if [ -z "${BASEMENT_BETS_URL}" ]; then
            echo "Missing secret BASEMENT_BETS_URL (e.g. https://basement-bets.vercel.app)" >&2
            exit 1
          fi

          if [ -z "${BASEMENT_CRON_SECRET}" ]; then
            echo "Missing secret BASEMENT_CRON_SECRET (must match server CRON_SECRET)." >&2
            echo "Tip: set it in GitHub → Settings → Secrets and variables → Actions." >&2
            exit 1
          fi

          url="${BASEMENT_BETS_URL%/}/api/jobs/run_council_today"

          # Optional date_et param
          if [ -n "${DATE_ET}" ]; then
            url="${url}?date_et=${DATE_ET}"
          fi

          echo "Calling: ${url}"

          # Use Bearer CRON_SECRET to pass auth middleware.
          # Vercel jobs are expected to return JSON.
          curl -sS -X POST \
            -H "Authorization: Bearer ${BASEMENT_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail \
            "${url}" | tee /tmp/run_council_today.json

          echo "\n--- Response ---"
          cat /tmp/run_council_today.json
