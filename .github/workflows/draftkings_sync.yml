name: Queue DraftKings Ingest (New Pipeline)

on:
  workflow_dispatch:
  schedule:
    # Keep as a backup trigger (Vercel cron also enqueues DK_INGEST daily)
    - cron: '0 10 * * *'

jobs:
  queue-dk:
    runs-on: ubuntu-latest

    steps:
      - name: Enqueue DK_INGEST job (no scraping in CI)
        env:
          BASEMENT_BETS_URL: ${{ secrets.BASEMENT_BETS_URL }}
          BASEMENT_CRON_SECRET: ${{ secrets.BASEMENT_CRON_SECRET }}
        run: |
          set -euo pipefail
          url="${BASEMENT_BETS_URL%/}/api/jobs/queue_sync/draftkings"
          echo "Queueing DraftKings ingest job via: ${url}"
          curl -sS -X POST \
            -H "Authorization: Bearer ${BASEMENT_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail "${url}"
