
name: NCAAM Frequent Jobs

on:
  schedule:
    # Clean hourly schedule
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ncaam-frequent-jobs
  cancel-in-progress: true

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements-worker.txt
          
      - name: Ingest Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 src/scripts/ingest_results.py

      - name: Ingest Odds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/ingest_odds.py

      - name: Build Market Consensus
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/build_market_consensus.py

      - name: Update Data Health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/update_data_health.py

      - name: Build Daily Top Picks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/build_daily_top_picks.py

      - name: Verify Daily Top Picks (today ET)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 - <<'PY'
          from datetime import datetime
          import psycopg2
          import psycopg2.extras
          import os

          dsn = os.environ.get('DATABASE_URL')
          assert dsn, 'DATABASE_URL missing'

          conn = psycopg2.connect(dsn, cursor_factory=psycopg2.extras.DictCursor)
          cur = conn.cursor()
          cur.execute("SELECT (NOW() AT TIME ZONE 'America/New_York')::date::text")
          today = cur.fetchone()[0]

          cur.execute("SELECT COUNT(*) AS n, SUM(CASE WHEN is_actionable THEN 1 ELSE 0 END) AS n_action FROM daily_top_picks WHERE date_et=%s AND league='NCAAM'", (today,))
          row = cur.fetchone()
          n = int(row['n'] or 0)
          n_action = int(row['n_action'] or 0)

          print(f"daily_top_picks for {today}: total={n} actionable={n_action}")

          # fail hard if we wrote nothing at all (usually means wrong DB or script didn't run)
          if n == 0:
            raise SystemExit(2)
          PY
          
      - name: Run Settlement
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/run_settlement.py

      - name: Grade Predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/grade_predictions.py

      - name: Trigger Agent Council
        env:
          BASEMENT_BETS_URL: ${{ secrets.BASEMENT_BETS_URL }}
          BASEMENT_CRON_SECRET: ${{ secrets.BASEMENT_CRON_SECRET }}
        run: |
          set -euo pipefail

          diag_url="${BASEMENT_BETS_URL%/}/api/jobs/diag_auth"
          url="${BASEMENT_BETS_URL%/}/api/jobs/run_council_today"

          echo "Auth diagnostic: ${diag_url}"
          curl -sS -X GET \
            -H "Authorization: Bearer ${BASEMENT_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail-with-body "${diag_url}" || true

          echo "Triggering Agent Council: ${url}"
          curl -sS -X POST \
            -H "Authorization: Bearer ${BASEMENT_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail-with-body "${url}"
