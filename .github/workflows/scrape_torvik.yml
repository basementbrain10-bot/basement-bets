name: Scrape Torvik Data

on:
  schedule:
    # Run every 6 hours during CBB season
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: torvik-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-worker.txt

      - name: Scrape Torvik and update DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/github_scrape_torvik.py

      - name: Update Data Health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/update_data_health.py

      - name: Summary
        run: |
          echo "✅ Torvik scrape complete at $(date)"
