name: KenPom Daily Ingest

on:
  schedule:
    # Once per day at 6:15 AM ET (11:15 UTC during standard time; 10:15 UTC during DST).
    # We keep it in UTC; adjust if needed.
    - cron: '15 11 * * *'
  workflow_dispatch:

concurrency:
  group: kenpom-daily
  cancel-in-progress: true

jobs:
  ingest:
    # KenPom is protected by Cloudflare; GitHub-hosted runners frequently get 403.
    # Use a self-hosted runner on your home/residential IP.
    runs-on: [self-hosted, kenpom]
    timeout-minutes: 25

    # actions/setup-python wants to install into the runner toolcache.
    # On some self-hosted macOS setups it defaults to /Users/runner (which may not exist / be writable).
    env:
      # actions/setup-python respects RUNNER_TOOL_CACHE
      RUNNER_TOOL_CACHE: /Users/basementai/actions-runner-kenpom/_toolcache

    steps:
      - name: Ensure toolcache dir
        run: mkdir -p "$RUNNER_TOOL_CACHE"

      - uses: actions/checkout@v4

      # On self-hosted macOS, actions/setup-python may attempt privileged installs via sudo.
      # Use the machine's existing Python instead.
      - name: Use system Python
        run: |
          which python3 || true
          python3 --version
          python3 -m pip --version

      - name: Install dependencies (venv)
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements-worker.txt

      - name: Ingest KenPom (daily)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KENPOM_COOKIE: ${{ secrets.KENPOM_COOKIE }}
        run: |
          source .venv/bin/activate
          python src/scripts/ingest_kenpom.py

      - name: Update Data Health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          source .venv/bin/activate
          python src/scripts/update_data_health.py

      - name: Summary
        run: |
          echo "✅ KenPom ingest complete at $(date)"