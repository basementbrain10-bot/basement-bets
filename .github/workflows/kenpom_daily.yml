name: KenPom Daily Ingest

on:
  schedule:
    # 6:15 AM ET = 11:15 UTC (EST) / 10:15 UTC (EDT).
    # Running at 11:15 UTC covers both time periods safely.
    - cron: '15 11 * * *'
  workflow_dispatch:

concurrency:
  group: kenpom-daily
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-worker.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-worker.txt

      - name: Ingest KenPom (daily)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Prefer username+password login (fresh session each run, no cookie management).
          # If KENPOM_COOKIE is also set it will be used as a fallback if login fails.
          KENPOM_EMAIL: ${{ secrets.KENPOM_EMAIL }}
          KENPOM_PASSWORD: ${{ secrets.KENPOM_PASSWORD }}
          KENPOM_COOKIE: ${{ secrets.KENPOM_COOKIE }}
        run: python src/scripts/ingest_kenpom.py

      - name: Update Data Health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/scripts/update_data_health.py

      - name: Summary
        run: echo "✅ KenPom ingest complete at $(date)"