name: KenPom Daily Ingest

on:
  schedule:
    # Once per day at 6:15 AM ET (11:15 UTC during standard time; 10:15 UTC during DST).
    # We keep it in UTC; adjust if needed.
    - cron: '15 11 * * *'
  workflow_dispatch:

concurrency:
  group: kenpom-daily
  cancel-in-progress: true

jobs:
  ingest:
    # KenPom is protected by Cloudflare; GitHub-hosted runners frequently get 403.
    # Use a self-hosted runner on your home/residential IP.
    runs-on: [self-hosted, kenpom]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-worker.txt

      - name: Ingest KenPom (daily)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KENPOM_COOKIE: ${{ secrets.KENPOM_COOKIE }}
        run: |
          python3 src/scripts/ingest_kenpom.py

      - name: Update Data Health
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 src/scripts/update_data_health.py

      - name: Summary
        run: |
          echo "✅ KenPom ingest complete at $(date)"